# Sources the collector pulls from each run.
#
# Each entry under `queries` becomes a GitHub Search API call:
#   https://api.github.com/search/repositories?q=<q>&sort=<sort>&order=<order>
#
# `curated` is a static list of "always consider" repos in owner/name form.

defaults:
  per_page: 30
  max_per_query: 30

queries:
  - name: trending-ai-this-week
    q: "topic:ai stars:>50 pushed:>{seven_days_ago}"
    sort: stars
    order: desc

  - name: new-python-tools
    q: "language:Python stars:>20 created:>{thirty_days_ago}"
    sort: stars
    order: desc

  - name: active-rust-libraries
    q: "language:Rust stars:>100 pushed:>{seven_days_ago}"
    sort: updated
    order: desc

curated:
  # - astral-sh/uv
  # - sourcegraph/amp
