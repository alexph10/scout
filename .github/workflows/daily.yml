name: Daily shortlist

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SCOUT_HOME: ${{ github.workspace }}/.scout
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scout run

      - name: Commit shortlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p reports data
          cp -r .scout/reports/* reports/ 2>/dev/null || true
          cp -r .scout/data/* data/ 2>/dev/null || true
          git add reports/ data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily shortlist $(date -u +%Y-%m-%d)"
            git push
          fi
